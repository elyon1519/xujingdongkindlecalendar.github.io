    var MONTHS_CN = ["","一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
    var lastRenderedKey = "";

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, function(ch) {
        return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
      });
    }
    function makeKey(month, day) { return month + "-" + day; }
    function daysInMonth(month) {
      if (month === 2) return 28;
      if (month === 4 || month === 6 || month === 9 || month === 11) return 30;
      return 31;
    }
    function normalizeDate(month, day) {
      if (month < 1) month = 12;
      if (month > 12) month = 1;
      if (day < 1) {
        month -= 1;
        if (month < 1) month = 12;
        day = daysInMonth(month);
      } else if (day > daysInMonth(month)) {
        month += 1;
        if (month > 12) month = 1;
        day = 1;
      }
      return { month: month, day: day };
    }
    function getTodayDate() {
      var now = new Date();
      return { year: now.getFullYear(), month: now.getMonth() + 1, day: now.getDate(), weekday: WEEKDAYS[now.getDay()] };
    }
    function getQueryDate() {
      var q = window.location.search || "";
      var m = q.match(/[?&]d=(\d{1,2})-(\d{1,2})/);
      if (!m) return null;
      return { month: parseInt(m[1], 10), day: parseInt(m[2], 10) };
    }
    function setStyle(id, prop, value) {
      var el = document.getElementById(id);
      if (el && el.style) el.style[prop] = value;
    }
    function applyKindleLayout(quoteLength) {
      var docEl = document.documentElement || {};
      var bodyEl = document.body || {};
      var appEl = document.getElementById("app") || {};
      var w = appEl.clientWidth || window.innerWidth || docEl.clientWidth || bodyEl.clientWidth || 758;
      var h = appEl.clientHeight || window.innerHeight || docEl.clientHeight || bodyEl.clientHeight || 540;
      if (w < 320) w = 758;
      if (h < 320) h = 540;
      var edge = 24;
      var monthTopPad = 16;
      var monthYiGap = 24;
      var yiDateGap = 80;
      var dateQuoteGap = 36;
      var quoteSourceGap = 12;
      var sourceWeekdayGap = 24;
      var weekdayBottom = 45;

      var monthSize = Math.max(14, Math.min(18, Math.floor(h * 0.024)));
      var monthH = Math.floor(monthSize * 1.8);
      var yiSize = Math.max(40, Math.min(56, Math.floor(h * 0.073)));
      var yiLine = Math.floor(yiSize * 1.12);
      var quoteSize = Math.max(26, Math.min(34, Math.floor(h * 0.046)));
      if (quoteLength > 65) quoteSize = Math.max(24, quoteSize - 3);
      if (quoteLength > 90) quoteSize = Math.max(22, quoteSize - 3);
      var quoteLine = Math.floor(quoteSize * 1.68);
      var sourceSize = Math.max(10, Math.min(13, Math.floor(h * 0.017)));
      var weekdaySize = Math.max(13, Math.min(16, Math.floor(h * 0.022)));
      var weekdayH = Math.floor(weekdaySize * 2.05);

      var monthTop = monthTopPad;
      var yiTop = monthTop + monthH + monthYiGap;
      var dateTop = yiTop + yiLine + yiDateGap;

      var weekdayTop = h - weekdayBottom - weekdayH;
      var sourceH = Math.floor(sourceSize * 1.5);
      var sourceTop = weekdayTop - sourceWeekdayGap - sourceH;
      var charsPerLine = Math.max(10, Math.floor((w - edge * 2) / (quoteSize * 1.05)));
      var quoteLines = Math.ceil(Math.max(1, quoteLength) / charsPerLine);
      if (quoteLines < 2) quoteLines = 2;
      if (quoteLines > 4) quoteLines = 4;
      var quoteH = quoteLines * quoteLine;
      var quoteTop = sourceTop - quoteSourceGap - quoteH;

      var maxDateHeight = quoteTop - dateQuoteGap - dateTop;
      var desiredDateHeight = Math.floor(h * 0.648);
      var dateHeight = Math.min(desiredDateHeight, maxDateHeight);
      if (dateHeight < Math.floor(h * 0.28)) dateHeight = Math.max(180, Math.floor(h * 0.28));

      var dayText = (document.getElementById("dayNumber") || {}).textContent || "14";
      var digitFactor = dayText.length <= 1 ? 0.50 : 0.80;
      var dayFont = Math.floor(Math.min((w - edge * 2) * 1.27 / digitFactor, dateHeight * 1.82));
      if (dayFont < 446) dayFont = 446;
      if (dayFont > 749) dayFont = 749;
      dateHeight = Math.max(dateHeight, Math.floor(dayFont * 0.82));
      if (dateTop + dateHeight + dateQuoteGap > quoteTop) {
        dateHeight = Math.max(170, quoteTop - dateQuoteGap - dateTop);
        dayFont = Math.floor(Math.min(dayFont, dateHeight * 1.82));
      }

      setStyle("monthPill", "top", monthTop + "px");
      setStyle("monthPill", "fontSize", monthSize + "px");
      var monthW = Math.max(104, Math.floor(w * 0.18));
      setStyle("monthPill", "width", monthW + "px");
      setStyle("monthPill", "left", Math.floor((w - monthW) / 2) + "px");
      setStyle("monthPill", "transform", "none");

      setStyle("auspicious", "top", yiTop + "px");
      setStyle("auspicious", "left", "0px");
      setStyle("auspicious", "width", w + "px");
      setStyle("auspicious", "marginTop", "0px");
      setStyle("auspicious", "fontSize", yiSize + "px");
      setStyle("auspicious", "lineHeight", "1.08");
      setStyle("auspicious", "fontWeight", "600");

      setStyle("dateStage", "top", dateTop + "px");
      setStyle("dateStage", "left", edge + "px");
      setStyle("dateStage", "height", dateHeight + "px");
      setStyle("dateStage", "minHeight", dateHeight + "px");
      setStyle("dateStage", "marginTop", "0px");
      setStyle("dateStage", "width", (w - edge * 2) + "px");
      setStyle("dayNumber", "fontSize", dayFont + "px");
      setStyle("dayNumber", "lineHeight", "0.86");
      setStyle("dayNumber", "letterSpacing", "0");
      setStyle("dayNumber", "transform", "none");

      setStyle("quoteWrap", "top", quoteTop + "px");
      setStyle("quoteWrap", "left", edge + "px");
      setStyle("quoteWrap", "marginTop", "0px");
      setStyle("quoteWrap", "width", (w - edge * 2) + "px");
      setStyle("quoteWrap", "height", quoteH + "px");
      setStyle("quoteWrap", "maxHeight", quoteH + "px");
      setStyle("quote", "fontSize", quoteSize + "px");
      setStyle("quote", "lineHeight", "1.68");
      setStyle("quote", "fontWeight", "400");

      setStyle("source", "top", sourceTop + "px");
      setStyle("source", "left", edge + "px");
      setStyle("source", "width", (w - edge * 2) + "px");
      setStyle("source", "marginTop", "0px");
      setStyle("source", "fontSize", sourceSize + "px");
      setStyle("source", "lineHeight", "1.55");
      setStyle("source", "maxHeight", sourceH + "px");

      setStyle("bottomRow", "bottom", weekdayBottom + "px");
      setStyle("bottomRow", "left", "0px");
      setStyle("bottomRow", "width", w + "px");
      setStyle("bottomRow", "marginTop", "0px");
      setStyle("bottomRow", "paddingTop", "0px");
      setStyle("weekdayPill", "fontSize", weekdaySize + "px");
      setStyle("weekdayPill", "fontWeight", "400");
      setStyle("weekdayPill", "minWidth", Math.max(104, Math.floor(w * 0.18)) + "px");
      var qWrap = document.getElementById("quoteWrap");
      var quote = document.getElementById("quote");
      if (qWrap && quote && qWrap.getBoundingClientRect) {
        var minQuote = quoteLength > 70 ? 22 : 24;
        while (quote.scrollHeight > qWrap.clientHeight && quoteSize > minQuote) {
          quoteSize -= 2;
          quote.style.fontSize = quoteSize + "px";
          quote.style.lineHeight = "1.68";
        }
      }
    }
    function render(month, day, isToday) {
      var d = normalizeDate(month, day);
      month = d.month;
      day = d.day;
      var key = makeKey(month, day);
      var item = CALENDAR_DATA[key];
      var today = getTodayDate();
      if (!item) {
        document.getElementById("app").innerHTML = '<div class="error">没有找到 ' + month + '月' + day + '日 的日历数据。</div>';
        return;
      }
      var weekday = isToday ? today.weekday : WEEKDAYS[(new Date(today.year, month - 1, day)).getDay()];
      var prev = normalizeDate(month, day - 1);
      var next = normalizeDate(month, day + 1);
      var html = '';
      var dayText = String(day);
      var dayHtml = '';
      for (var i = 0; i < dayText.length; i++) {
        var ch = dayText.charAt(i);
        dayHtml += '<span class="digit digit-' + ch + '">' + ch + '</span>';
      }
      html += '<div class="month-pill" id="monthPill">' + escapeHtml(MONTHS_CN[month]) + '</div>';
      html += '<div class="auspicious" id="auspicious">' + escapeHtml(item.yi) + '</div>';
      html += '<div class="date-stage" id="dateStage">';
      html += '<div class="day-number" id="dayNumber">' + dayHtml + '</div>';
      html += '</div>';
      html += '<div class="quote-wrap" id="quoteWrap"><div class="quote" id="quote">' + escapeHtml(item.quote) + '</div></div>';
      html += '<div class="source" id="source">《' + escapeHtml(item.title) + '》</div>';
      html += '<div class="bottom-row" id="bottomRow"><div class="weekday-pill" id="weekdayPill">' + escapeHtml(weekday) + '</div></div>';
      html += '<div class="nav"><button type="button" onclick="render(' + prev.month + ',' + prev.day + ',false)">前日</button><button type="button" onclick="renderToday(true)">今日</button><button type="button" onclick="render(' + next.month + ',' + next.day + ',false)">次日</button></div>';
      document.getElementById("app").innerHTML = html;
      applyKindleLayout(String(item.quote || "").length);
      lastRenderedKey = key;
    }
    function renderToday(clearQuery) {
      var today = getTodayDate();
      if (today.month === 2 && today.day === 29) {
        render(2, 28, true);
      } else {
        render(today.month, today.day, true);
      }
      if (clearQuery && window.history && window.history.replaceState) {
        try { window.history.replaceState(null, document.title, window.location.pathname); } catch(e) {}
      }
    }
    function init() {
      var qd = getQueryDate();
      if (qd) render(qd.month, qd.day, false);
      else renderToday(false);
      window.setInterval(function() {
        var today = getTodayDate();
        var key = makeKey(today.month, today.day);
        if (key !== lastRenderedKey) renderToday(false);
      }, 60000);
      if (window.addEventListener) {
        window.addEventListener("resize", function() {
          var key = lastRenderedKey;
          var item = CALENDAR_DATA[key] || {};
          applyKindleLayout(String(item.quote || "").length);
        });
      }
    }
    init();
  </script>
</body>
</html>
